name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hts-local .

      - name: Run test suite
        run: docker run --rm hts-local -m pytest tests/ -v

      - name: Verify CLI help
        run: docker run --rm hts-local hts.py --help
