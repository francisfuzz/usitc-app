name: Refresh HTS Data

on:
  schedule:
    # Once daily at 00:12 UTC
    - cron: '12 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changes_detected: ${{ steps.check-changes.outputs.changes_detected }}
      changed_chapters: ${{ steps.check-changes.outputs.changed_chapters }}
      change_summary: ${{ steps.check-changes.outputs.change_summary }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build Docker image
        run: docker build -t hts-local .

      - name: Ensure data directory exists
        run: mkdir -p "$(pwd)/data"

      - name: Initialize database if needed
        run: |
          if [ ! -f "$(pwd)/data/hts.db" ]; then
            echo "Database not found. Running initial ingest..."
            docker run --rm --user root -v "$(pwd)/data:/app/data" hts-local scripts/ingest.py
          else
            echo "Database found. Skipping ingest."
          fi

      - name: Run refresh script
        run: |
          docker run --rm --user root -v "$(pwd)/data:/app/data" hts-local scripts/refresh.py

      - name: Check for changes
        id: check-changes
        run: |
          # Query database to find recently changed chapters (last 10 minutes)
          CHANGED=$(docker run --rm --user root --entrypoint python3 -v "$(pwd)/data:/app/data" hts-local -c "
          import sqlite3, json
          from datetime import datetime, timedelta

          db = sqlite3.connect('/app/data/hts.db')
          db.row_factory = sqlite3.Row
          ten_mins_ago = (datetime.utcnow() - timedelta(minutes=10)).isoformat()

          cursor = db.execute('SELECT number, description, last_changed_at, content_hash FROM chapters WHERE last_changed_at > ? ORDER BY number', (ten_mins_ago,))
          changed_chapters = [{'number': r['number'], 'description': r['description'], 'changed_at': r['last_changed_at'], 'hash': r['content_hash']} for r in cursor]
          db.close()

          print(json.dumps({'changes_detected': bool(changed_chapters), 'chapters': changed_chapters}))
          ")

          CHANGES_DETECTED=$(echo "$CHANGED" | python3 -c "import sys, json; d=json.load(sys.stdin); print('true' if d['changes_detected'] else 'false')")

          echo "changes_detected=$CHANGES_DETECTED" >> $GITHUB_OUTPUT
          echo "changed_chapters=$CHANGED" >> $GITHUB_OUTPUT

      - name: Create issue for detected changes
        if: steps.check-changes.outputs.changes_detected == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: >
            const changed = JSON.parse('${{ steps.check-changes.outputs.changed_chapters }}');
            const chapters = changed.chapters || [];

            let chaptersMarkdown = '';
            if (chapters.length > 0) {
              chaptersMarkdown = chapters.map(ch =>
                '- **Chapter ' + ch.number + '** (' + ch.description + '): hash changed to `' + ch.hash.substring(0, 8) + '...`'
              ).join('\n');
            }

            const timestamp = new Date().toISOString();
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const body = 'Changes detected in HTS tariff data during scheduled refresh.\n\n' +
              '**Detection Details:**\n' +
              '- Workflow run: [#${{ github.run_number }}](' + runUrl + ')\n' +
              '- Timestamp: ' + timestamp + '\n\n' +
              '**Changed Chapters:**\n' +
              chaptersMarkdown + '\n\n' +
              '---\n\n' +
              '## Next Steps\n' +
              'Review the changes above. When ready, [click here to approve and deploy](${{ github.server_url }}/${{ github.repository }}/actions/workflows/deploy-datasette.yml).\n\n' +
              '@francisfuzz';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[HTS Data Update] Changes detected in HTS tariff data',
              body: body,
              labels: ['data-update', 'requires-review']
            });
