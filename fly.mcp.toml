app = "tariff-everywhere-mcp"
primary_region = "iad"

[build]

[env]
  MCP_TRANSPORT = "streamable-http"
  PORT = "8080"

[[mounts]]
  source = "hts_data"
  destination = "/app/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
